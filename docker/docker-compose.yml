version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: chatbot_postgres
    environment:
      POSTGRES_DB: chatbot_db
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_pass_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      disable: true

  # LLM Proxy (NEW - Always running on CPU server)
  llm_proxy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    container_name: chatbot_llm_proxy
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../src/llm_proxy.py:/app/llm_proxy.py
      - ../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: python llm_proxy.py

  # Main Application (Streamlit + RAG)
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: chatbot_app
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm_proxy:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      # Database
      DATABASE_URL: postgresql://chatbot_user:${POSTGRES_PASSWORD:-chatbot_pass_2024}@postgres:5432/chatbot_db
      
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: documents
      
      # LLM Proxy (NEW)
      LLM_PROXY_URL: http://llm_proxy:5000
      
      # Model
      MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      MODEL_DIR: /app/models
      LLM_MODEL: ${LLM_MODEL:-qwen2-7b}  # Use proxy model by default
      HF_HOME: ${HF_HOME:-/hf_cache}
      SENTENCE_TRANSFORMERS_HOME: ${SENTENCE_TRANSFORMERS_HOME:-/hf_cache}
      
      # Python
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      
    volumes:
      - ../src:/app/src
      - ../scripts:/app/scripts
      - ../evaluation:/app/evaluation
      - ../database:/app/database
      - ../auth:/app/auth
      - ../services:/app/services
      - ../components:/app/components
      - ../models:/app/models
      - ../data:/app/data
      - ../logs:/app/logs
      - hf_cache_${BRANCH_NAME-main}:/hf_cache
    command: >
      sh -c "streamlit run src/app_v2.py
             --server.port=8501
             --server.address=0.0.0.0
             --server.headless=true
             --server.runOnSave=true"
    ports:
      - "8501:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  # FastAPI Chatbot API
  chatbot_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: chatbot_api

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      llm_proxy:
        condition: service_healthy

    env_file:
      - ../.env

    environment:
      # Database
      DATABASE_URL: postgresql://chatbot_user:${POSTGRES_PASSWORD:-chatbot_pass_2024}@postgres:5432/chatbot_db
      
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: documents
      
      # LLM Proxy
      LLM_PROXY_URL: http://llm_proxy:5000
      
      # Model
      MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      MODEL_DIR: /app/models
      HF_HOME: ${HF_HOME:-/hf_cache}
      SENTENCE_TRANSFORMERS_HOME: ${SENTENCE_TRANSFORMERS_HOME:-/hf_cache}
      
      # Python
      PYTHONPATH: /app:/app/src
      PYTHONUNBUFFERED: "1"

    volumes:
      - ../src:/app/src
      - ../scripts:/app/scripts
      - ../evaluation:/app/evaluation
      - ../database:/app/database
      - ../auth:/app/auth
      - ../services:/app/services
      - ../components:/app/components
      - ../models:/app/models
      - ../data:/app/data
      - ../logs:/app/logs
      - ../widget:/app/widget
      - hf_cache_${BRANCH_NAME-main}:/hf_cache

    command: >
      sh -c "uvicorn src.api_service:app --host 0.0.0.0 --port 8000"

    ports:
      - "9100:8000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  qdrant_data:
  hf_cache_main:
  hf_cache_dev: